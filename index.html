<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highway Secondary School — Management System</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0a7c4b;--green-l:#e8f5ef;--green-m:#1aab6d;--green-d:#065c37;
  --gold:#c8860a;--gold-l:#fdf3e0;--gold-m:#e9a020;
  --red:#d93025;--red-l:#fdecea;
  --blue:#1a73e8;--blue-l:#e8f0fe;
  --purple:#7b2d8b;--purple-l:#f3e8f7;
  --gray-50:#f8f9fa;--gray-100:#f1f3f4;--gray-200:#e8eaed;--gray-300:#dadce0;
  --gray-400:#bdc1c6;--gray-500:#9aa0a6;--gray-600:#80868b;
  --gray-700:#5f6368;--gray-800:#3c4043;--gray-900:#202124;
  --sidebar-w:260px;--topbar-h:64px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:0 10px 40px rgba(0,0,0,.12);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4f8;color:var(--gray-900);min-height:100vh;overflow-x:hidden}
#root{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);min-height:100vh;background:linear-gradient(175deg,#063d24 0%,#0a5c38 40%,#0d7048 100%);
  position:fixed;left:0;top:0;z-index:100;display:flex;flex-direction:column;
  box-shadow:4px 0 24px rgba(0,0,0,.15);transition:transform .3s ease;
}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand-logo{width:44px;height:44px;background:var(--gold-m);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:700;color:#fff;font-size:18px;margin-bottom:10px}
.sidebar-brand-name{font-family:'Sora',sans-serif;color:#fff;font-weight:700;font-size:14px;line-height:1.3}
.sidebar-brand-sub{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:16px 16px 8px;color:rgba(255,255,255,.4);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:1px 8px;border-radius:8px;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.75);font-size:13.5px;font-weight:500;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav-item svg{opacity:.8;flex-shrink:0}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--gold-m);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1)}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:background .18s}
.user-pill:hover{background:rgba(255,255,255,.08)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold-m);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0}
.user-name{color:#fff;font-size:13px;font-weight:600}
.user-role{color:rgba(255,255,255,.5);font-size:11px}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
.topbar-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;color:var(--gray-900)}
.topbar-sub{font-size:12px;color:var(--gray-500);margin-top:1px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:inherit}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-d)}
.btn-outline{background:#fff;color:var(--gray-800);border:1.5px solid var(--gray-300)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:8px;background:var(--gray-100);color:var(--gray-700);border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .18s}
.btn-icon:hover{background:var(--gray-200)}
.page{padding:28px;flex:1}

/* CARDS */
.card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);overflow:hidden}
.card-header{padding:18px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;color:var(--gray-900)}
.card-body{padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:20px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.stat-label{font-size:12px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-value{font-size:26px;font-weight:800;color:var(--gray-900);line-height:1;font-family:'Sora',sans-serif}
.stat-change{font-size:12px;color:var(--green);font-weight:600;margin-top:4px}
.stat-change.neg{color:var(--red)}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:10px 14px;background:var(--gray-50);color:var(--gray-600);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--gray-200)}
td{padding:13px 14px;border-bottom:1px solid var(--gray-100);color:var(--gray-800);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;line-height:1.4}
.badge-green{background:var(--green-l);color:var(--green-d)}
.badge-gold{background:var(--gold-l);color:var(--gold)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}

/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}

/* GRID HELPERS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.gap-4{gap:16px}
.mb-4{margin-bottom:16px}
.mb-6{margin-bottom:24px}
.mt-4{margin-top:16px}
.ml-auto{margin-left:auto}

/* FORMS */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12.5px;font-weight:700;color:var(--gray-700);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13.5px;font-family:inherit;color:var(--gray-900);transition:border-color .18s;outline:none;background:#fff}
.form-control:focus{border-color:var(--green)}
select.form-control{cursor:pointer}

/* PROGRESS BARS */
.progress{height:8px;background:var(--gray-200);border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .4s ease}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:20px;gap:0}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--gray-800)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* CBC LEVEL CHIPS */
.pathway-stem{background:#e8f0fe;color:#1a73e8}
.pathway-arts{background:#fce8f3;color:#c2185b}
.pathway-social{background:#e8f5e9;color:#2e7d32}
.pathway-junior{background:#fff8e1;color:#f57f17}

/* COMPETENCY BARS */
.comp-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.comp-label{font-size:12.5px;color:var(--gray-700);width:160px;flex-shrink:0}
.comp-bar{flex:1;height:10px;background:var(--gray-200);border-radius:99px;overflow:hidden}
.comp-fill{height:100%;border-radius:99px}
.comp-pct{font-size:12px;font-weight:700;width:38px;text-align:right;color:var(--gray-700)}
.exceeding{background:linear-gradient(90deg,#0a7c4b,#1aab6d)}
.meeting{background:linear-gradient(90deg,#1a73e8,#4fa3ff)}
.approaching{background:linear-gradient(90deg,#c8860a,#e9a020)}
.below{background:linear-gradient(90deg,#d93025,#f44336)}

/* NOTIFICATION DOT */
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-left:4px}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:#fff;border-radius:var(--radius-xl);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .25s ease}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800;color:var(--gray-900);font-family:'Sora',sans-serif}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;gap:10px;justify-content:flex-end}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ANNOUNCEMENT */
.announcement{background:linear-gradient(135deg,var(--green-l),#f0faf5);border:1px solid #b8e0cc;border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start}
.ann-icon{width:36px;height:36px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ann-title{font-size:13.5px;font-weight:700;color:var(--gray-900);margin-bottom:3px}
.ann-body{font-size:12.5px;color:var(--gray-600);line-height:1.5}
.ann-date{font-size:11px;color:var(--gray-400);margin-top:4px}

/* CHART CONTAINER */
.chart-container{width:100%;height:260px}

/* TIMETABLE GRID */
.tt-grid{display:grid;grid-template-columns:80px repeat(5,1fr);gap:3px;font-size:12px}
.tt-head{background:var(--green);color:#fff;padding:8px 6px;border-radius:6px;text-align:center;font-weight:700;font-size:11.5px}
.tt-time{background:var(--gray-100);border-radius:6px;padding:8px 6px;text-align:center;font-weight:600;color:var(--gray-500);font-size:11px;display:flex;align-items:center;justify-content:center}
.tt-cell{border-radius:6px;padding:8px 8px;text-align:center;font-size:11.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:52px;cursor:pointer;transition:opacity .15s}
.tt-cell:hover{opacity:.85}
.tt-empty{background:var(--gray-50);border:1px dashed var(--gray-200);border-radius:6px;min-height:52px}

/* ATTENDANCE CALENDAR */
.att-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.att-day-head{text-align:center;font-size:10.5px;font-weight:700;color:var(--gray-500);padding:4px 0;text-transform:uppercase}
.att-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.att-present{background:var(--green-l);color:var(--green-d)}
.att-absent{background:var(--red-l);color:var(--red)}
.att-late{background:var(--gold-l);color:var(--gold)}
.att-none{background:var(--gray-100);color:var(--gray-400)}
.att-today{ring:2px solid var(--green)}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:540px){
  .stat-grid{grid-template-columns:1fr}
  .page{padding:16px}
  .topbar{padding:0 16px}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:var(--gray-100);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--gray-500);cursor:text;min-width:200px;border:1.5px solid transparent;transition:all .18s}
.search-box:focus-within{background:#fff;border-color:var(--green)}
.search-box input{border:none;background:transparent;outline:none;font-size:13px;font-family:inherit;color:var(--gray-900);width:100%}

/* WELCOME BANNER */
.welcome-banner{background:linear-gradient(135deg,#063d24 0%,#0a5c38 50%,#0d7048 100%);border-radius:var(--radius-xl);padding:28px 32px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.welcome-banner::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(255,255,255,.04);border-radius:50%}
.welcome-banner::before{content:'';position:absolute;right:60px;bottom:-60px;width:160px;height:160px;background:rgba(255,255,255,.03);border-radius:50%}
.wb-greeting{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:4px}
.wb-name{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px}
.wb-sub{font-size:13px;color:rgba(255,255,255,.65);line-height:1.5}
.wb-stats{display:flex;gap:24px;margin-top:20px}
.wb-stat{border-left:2px solid rgba(255,255,255,.2);padding-left:16px}
.wb-stat-val{font-size:22px;font-weight:800;font-family:'Sora',sans-serif}
.wb-stat-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* LOADING */
.skeleton{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* QUICK ACTION BUTTONS */
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.qa-btn{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.qa-btn:hover{border-color:var(--green);box-shadow:var(--shadow-sm)}
.qa-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.qa-label{font-size:12px;font-weight:700;color:var(--gray-700)}

/* ACTIVITY FEED */
.activity-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.act-text{font-size:13px;color:var(--gray-700);line-height:1.4}
.act-time{font-size:11px;color:var(--gray-400);margin-top:2px}

/* CBC PATHWAY CARD */
.pathway-card{border-radius:var(--radius-lg);padding:20px;border:2px solid;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pathway-card:hover{box-shadow:var(--shadow-md)}
.pathway-card.selected{box-shadow:0 0 0 3px currentColor}
.pathway-card-stem{background:#e8f0fe;border-color:#4285f4;color:#1a73e8}
.pathway-card-arts{background:#fce8f3;border-color:#e91e8c;color:#c2185b}
.pathway-card-social{background:#e8f5e9;border-color:#43a047;color:#2e7d32}

/* FEE STATUS */
.fee-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.fee-amt{font-size:22px;font-weight:800;font-family:'Sora',sans-serif;color:var(--gray-900)}
.fee-term{font-size:12px;color:var(--gray-500);margin-top:2px}
.fee-progress{flex:1}

/* NOTIFICATION PANEL */
.notif-item{padding:12px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .15s;display:flex;gap:12px;align-items:flex-start}
.notif-item:hover{background:var(--gray-50)}
.notif-item.unread{background:var(--blue-l)}
.notif-dot-ind{width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0}
</style>
</head>

    report:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{paths[n]||null}</svg>;
};

const avatarColor = name => {
  const colors = ['#0a7c4b','#1a73e8','#7b2d8b','#c2185b','#c8860a','#2196f3','#e91e63','#4caf50'];
  let h = 0; for(let c of name) h = (h*31+c.charCodeAt(0))%colors.length;
  return colors[h];
};
const initials = name => name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const Avatar = ({name,size=32}) => (
  <div className="avatar" style={{width:size,height:size,background:avatarColor(name),fontSize:size*0.35}}>
    {initials(name)}
  </div>
);
const LevelBadge = ({level}) => {
  const map = {Exceeding:['badge-green','Exceeding'],Meeting:['badge-blue','Meeting'],Approaching:['badge-gold','Approaching'],Below:['badge-red','Below']};
  const [cls,lbl] = map[level]||['badge-gray',level];
  return <span className={`badge ${cls}`}>{lbl}</span>;
};
const FeesBadge = ({status}) => {
  const map={paid:['badge-green','Paid'],partial:['badge-gold','Partial'],arrears:['badge-red','Arrears']};
  const [cls,lbl]=map[status]||['badge-gray',status];
  return <span className={`badge ${cls}`}>{lbl}</span>;
};
const PathwayBadge = ({p}) => {
  const map={Junior:['badge-gold','Junior Sec.'],STEM:['badge-blue','STEM'],'Arts & Sports':['badge-purple','Arts & Sports'],'Social Sciences':['badge-green','Social Sci.']};
  const [cls,lbl]=map[p]||['badge-gray',p];
  return <span className={`badge ${cls}`}>{lbl}</span>;
};

const App = () => {

      case 'analytics': return <AnalyticsPage/>;
      case 'pathways': return <PathwaysPage/>;

      case 'settings': return <SettingsPage/>;
      default: return <div style={{padding:40,textAlign:'center',color:'var(--gray-400)'}}>Page coming soon</div>;

  const pageTitle = NAV.flatMap(s=>s.items).find(i=>i.key===page)?.label || 'Dashboard';

              {section.items.map(item=>(
                <div key={item.key} className={`nav-item${page===item.key?' active':''}`} onClick={()=>navigate(item.key)}>
                  <Icon n={item.icon} s={16}/>
                  {item.label}
                  {item.badge&&<span className="nav-badge">{item.badge}</span>}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-pill">
            <div className="user-avatar">P</div>
            <div><div className="user-name">Principal</div><div className="user-role">Admin · Highway Sec.</div></div>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main className="main">

          <button className="btn-icon" style={{display:'none'}} onClick={()=>setSidebarOpen(!sidebarOpen)}><Icon n="menu" s={18}/></button>

          </div>
        </header>
        <div className="page">{renderPage()}</div>
      </main>
    </>

};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
